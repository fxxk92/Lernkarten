<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Meine Lernkarten</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .card { width: 300px; height: 200px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; box-shadow: 0 4px 8px rgba(0,0,0,0.2); border-radius: 10px; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; border-radius: 10px; background: white; font-size: 1.2rem; }
        .back { background: #007bff; color: white; transform: rotateY(180deg); }
    </style>
</head>
<body>

    <div class="card" onclick="this.classList.toggle('flipped')">
        <div class="card-inner">
            <div class="front">Was ist die Hauptstadt von Frankreich?</div>
            <div class="back">Paris</div>
        </div>
    </div>

</body>
</html>
